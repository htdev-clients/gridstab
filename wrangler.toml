# Cloudflare Pages configuration
# ─────────────────────────────────────────────────────────────────────────────
# SECRET KEYS must be set in the CF Pages dashboard, NOT here.
# Dashboard → Settings → Environment variables
# Add separate values for "Preview" (Stripe test keys) and "Production" (live).
#
# Required variables (used by functions/api/*):
#   STRIPE_SECRET_KEY       — sk_test_... (preview) / sk_live_... (production)
#   STRIPE_WEBHOOK_SECRET   — whsec_... (get from Stripe dashboard webhook config)
#   STRIPE_PRICE_ID         — price_... (create product+price in Stripe dashboard)
#   DOWNLOAD_LINK_SECRET    — random 32+ byte hex string; MUST match the value set
#                             on the watermark Worker (used to sign/verify book
#                             download URLs). Generate with:
#                               openssl rand -hex 32
#
# Resend secrets belong on the watermark Worker, not Pages — see
# workers/watermark/wrangler.toml.
# ─────────────────────────────────────────────────────────────────────────────

name = "gridstab"
pages_build_output_dir = "_site"

[[queues.producers]]
queue = "book-watermark-queue"
binding = "WATERMARK_QUEUE"

# R2 bucket — read-only access from functions/api/book/download.js to stream
# watermarked PDFs to buyers via signed link.
[[r2_buckets]]
binding = "BOOK_BUCKET"
bucket_name = "gridstab-books"
