<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ site.title }}</title>

  <!-- Tailwind CSS (built via CLI) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" sizes="any">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon-192.png' | relative_url }}" sizes="192x192">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

  <!-- SEO -->
  {% seo %}
  {% if page.noindex %}<meta name="robots" content="noindex, nofollow">{% endif %}
</head>
